<script>
async function initDatabase() {
  const btn = document.getElementById('initDbBtn');
  const status = document.getElementById('initDbStatus');
  btn.disabled = true;
  btn.textContent = 'еҲқе§ӢеҢ–дёӯ...';
  status.style.display = 'none';
  try {
    const res = await fetch('/.netlify/functions/init', { method: 'POST' });
    const json = await res.json();
    if (res.ok) {
      status.style.color = '#3b6d11';
      status.textContent = 'вң?' + json.message;
      status.style.display = 'block';
    } else {
      throw new Error(json.error || 'еҲқе§ӢеҢ–еӨұиҙ?);
    }
  } catch(e) {
    status.style.color = '#a32d2d';
    status.textContent = 'вқ?' + e.message;
    status.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'вҡҷпёҸ еҲқе§ӢеҢ–ж•°жҚ®еә“пјҲйҰ–ж¬ЎйғЁзҪІзӮ№еҮ»пјү';

const API_BASE = '/.netlify/functions/'; // Netlify Functions жӯЈзЎ®и·Ҝеҫ„
let apiToken = null; // JWT tokenпјҢеӯҳдә?sessionStorage

// з»ҹдёҖ API и°ғз”Ёе°ҒиЈ…
async function apiFetch(path, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (apiToken) headers['Authorization'] = 'Bearer ' + apiToken;
  const res = await fetch(API_BASE + path, { ...options, headers });
  const text = await res.text();
  let json;
  try {
    json = JSON.parse(text);
  } catch (e) {
    throw new Error('API иҝ”еӣһйқ?JSON: ' + text.substring(0, 200));
  }
  if (!res.ok) throw new Error(json.error || 'иҜ·жұӮеӨұиҙҘ');
  return json;
}

function addLog(action, module, target, detail){
  if(!currentUser) return;
  const family = getCurrentFamily();
  const entry = {
    id: 'log_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    time: new Date().toISOString(),
    userId: currentUser.id,
    username: currentUser.displayName,
    familyId: family.id,
    familyName: family.name,
    action,   // 'ж–°еўһ' | 'зј–иҫ‘' | 'еҲ йҷӨ'
    module,   // 'иө„дә§' | 'иҙҹеҖ? | 'еҖәжқғ' | 'жҲҗе‘ҳ' | 'ж”¶ж”Ҝ' | 'е®¶еәӯ' | 'з”ЁжҲ·'
    target,   // ж“ҚдҪңеҜ№иұЎеҗҚз§°
    detail    // йўқеӨ–иҜҙжҳҺ
  };
  DB.logs.unshift(entry);
  // жңҖеӨҡдҝқз•?00жқЎж—Ҙеҝ—пјҢйҳІжӯў localStorage иҶЁиғҖ
  if(DB.logs.length > 500) DB.logs = DB.logs.slice(0, 500);
  saveLogs();
  syncLog(action, module, target, detail); // ејӮжӯҘеҗҢжӯҘеҲ°жңҚеҠЎз«Ҝ
}

      <span style="display:inline-block;width:44px;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500;text-align:center;flex-shrink:0;background:${ACTION_BG[l.action]||'#f5f6fa'};color:${ACTION_COLORS[l.action]||'#5f5e5a'}">${l.action}</span>

        <div style="font-weight:500;font-size:13px">${l.target}</div>

// зЎ®дҝқж“ҚдҪңеҹәдәҺеҪ“еүҚе®¶еәӯзҡ„ж•°жҚ?function getCurrentFamilyData(){
  if(!currentUser) return null;
  // е®үе…Ёе…ңеә•пјҡжҷ®йҖҡз”ЁжҲ·ејәеҲ¶йҷҗеҲ¶дёәиҮӘе·ұзҡ„е®¶еәӯпјҢйҳІжӯўзҜЎж”№ currentFamilyId и¶Ҡжқғ
  const familyId = isAdmin() ? (currentFamilyId || currentUser.familyId) : currentUser.familyId;
  return {
    familyId,
    family: FAMILIES.find(f => f.id === familyId),
    // иҝҮж»ӨеҮәеҪ“еүҚе®¶еәӯзҡ„з”ЁжҲ·
    users: USERS.filter(u => u.familyId === familyId),

    assets: DB.assets.filter(a => !a.familyId || a.familyId === familyId),
    debts: DB.debts.filter(d => !d.familyId || d.familyId === familyId),
    receivables: DB.receivables.filter(r => !r.familyId || r.familyId === familyId),
    income: DB.income.filter(i => !i.familyId || i.familyId === familyId)
  };
}

// жЈҖжҹҘжҳҜеҗҰе·Ізҷ»еҪ•пјҲејӮжӯҘпјү
async function checkAuth(){
  const token = sessionStorage.getItem('ff_token');
  const savedUser = sessionStorage.getItem('ff_user');
  if(token && savedUser){
    try {
      apiToken = token;
      currentUser = JSON.parse(savedUser);
      currentFamilyId = sessionStorage.getItem('ff_familyId') || currentUser.familyId || 'fam_1';

      // д»ҺжңҚеҠЎз«ҜеҠ иҪҪ FAMILIES
      try {
        const fRes = await apiFetch('/families');
        FAMILIES = fRes.families || [];
      } catch(e) {
        // зҪ‘з»ңејӮеёёж—¶з”Ёжң¬ең°зј“еӯҳ
        FAMILIES = JSON.parse(localStorage.getItem('family_finance_families') || '[]');
      }
      
      // зЎ®дҝқиҮіе°‘жңүдёҖдёӘе®¶еәӯж•°жҚ?      if(FAMILIES.length === 0) {
        FAMILIES = [{ id: currentFamilyId || 'fam_1', name: 'й»ҳи®Өе®¶еәӯ' }];
      }

      // д»ҺжңҚеҠЎз«ҜеҠ иҪҪдёҡеҠЎж•°жҚ®
      try {
        const dRes = await apiFetch('/data/' + currentFamilyId);
        DB.members = dRes.data?.members || [];
        DB.assets = dRes.data?.assets || [];
        DB.debts = dRes.data?.debts || [];
        DB.receivables = dRes.data?.receivables || [];
        DB.income = dRes.data?.income || [];
        DB.logs = dRes.data?.logs || [];
        // еҗҢжӯҘеҲ°жң¬ең°зј“еӯ?        localStorage.setItem('family_finance_v6', JSON.stringify(DB));
      } catch(e) {
        DB = JSON.parse(localStorage.getItem('family_finance_v6') || 'null') || JSON.parse(JSON.stringify(DEFAULT_DATA));
        DB.logs = JSON.parse(localStorage.getItem('family_finance_logs') || 'null') || DB.logs || [];
      }

      showMainApp();
      return true;
    } catch(e) {
      apiToken = null;
      currentUser = null;
    }
  }
  return false;
}

// жү§иЎҢзҷ»еҪ•
async function doLogin(){
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!username || !password){
    showLoginError('иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚе’ҢеҜҶз ?);
    return;
  }
  try {
    const res = await apiFetch('/login', {
      method: 'POST',
      body: JSON.stringify({ username, password })
    });
    apiToken = res.token;
    currentUser = res.user;
    currentFamilyId = res.user.familyId || 'fam_1';
    saveSession();

    // еҠ иҪҪ FAMILIES
    try {
      const fRes = await apiFetch('/families');
      FAMILIES = fRes.families || [];
    } catch(e) { FAMILIES = []; }
    
    // зЎ®дҝқиҮіе°‘жңүдёҖдёӘе®¶еәӯж•°жҚ?    if(FAMILIES.length === 0) {
      FAMILIES = [{ id: currentFamilyId || 'fam_1', name: 'й»ҳи®Өе®¶еәӯ' }];
    }

    // еҠ иҪҪдёҡеҠЎж•°жҚ®
    try {
      const dRes = await apiFetch('/data/' + currentFamilyId);
      DB.members = dRes.data?.members || [];
      DB.assets = dRes.data?.assets || [];
      DB.debts = dRes.data?.debts || [];
      DB.receivables = dRes.data?.receivables || [];
      DB.income = dRes.data?.income || [];
      DB.logs = dRes.data?.logs || [];
      localStorage.setItem('family_finance_v6', JSON.stringify(DB));
    } catch(e) {
      DB = JSON.parse(JSON.stringify(DEFAULT_DATA));
      DB.logs = [];
    }

    showMainApp();
  } catch(e) {
    showLoginError(e.message || 'зҷ»еҪ•еӨұиҙҘпјҢиҜ·жЈҖжҹҘзҪ‘з»?);

function switchFamily(familyId){

  }

async function loadFamilyData(familyId) {

    DB.debts = dRes.data?.debts || [];

function openFamilyModal(editId){
  if(!isAdmin()){noPermission();return;}

  document.getElementById('family-modal-title').textContent = family ? 'зј–иҫ‘е®¶еәӯ' : 'еҲӣе»әж–°е®¶еә?;

function saveFamily(){
  const name = document.getElementById('f-name').value.trim();
  const code = document.getElementById('f-code').value.trim() || name.toLowerCase().replace(/\s+/g, '_');
  if(!name){alert('иҜ·еЎ«еҶҷе®¶еәӯеҗҚз§?);return;}
  
  if(window.editingFamilyId){
    // зј–иҫ‘жЁЎејҸпјҡжӣҙж–°зҺ°жңүе®¶еә?    const idx = FAMILIES.findIndex(f => f.id === window.editingFamilyId);
    if(idx === -1){alert('е®¶еәӯдёҚеӯҳең?);return;}
    FAMILIES[idx].name = name;
    FAMILIES[idx].code = code;
    FAMILIES[idx].note = document.getElementById('f-note').value;
    addLog('зј–иҫ‘','е®¶еәӯ',name,`дҝ®ж”№е®¶еәӯеҗҚз§°/д»ЈеҸ·`);
    saveFamilies();
    closeModal('family');
    openFamilyList(); // еҲ·ж–°еҲ—иЎЁ
    // еҰӮжһңдҝ®ж”№зҡ„жҳҜеҪ“еүҚе®¶еәӯпјҢеҗҢжӯҘжӣҙж–°йЎ¶йғЁжҳҫзӨ?    if(window.editingFamilyId === currentFamilyId){
      document.getElementById('currentFamilyName').textContent = name;
    }
    window.editingFamilyId = null;
  } else {
    // ж–°е»әжЁЎејҸ
    const familyId = 'fam_' + Date.now();
    FAMILIES.push({
      id: familyId,
      name,
      code,
      note: document.getElementById('f-note').value,
      createTime: new Date().toISOString()
    });
    addLog('ж–°еўһ','е®¶еәӯ',name,`еҲӣе»әж–°е®¶еәӯ`);
    saveFamilies();
    closeModal('family');
    openFamilyList();
    if(confirm('е®¶еәӯеҲӣе»әжҲҗеҠҹпјҒжҳҜеҗҰеҲҮжҚўеҲ°ж–°е®¶еәӯпјҹ')){
      switchFamily(familyId);
    }
  }
}

function delFamily(id){
  // еҸӘжңүз®ЎзҗҶе‘ҳеҸҜд»ҘеҲ йҷӨе®¶еә?  if(!isAdmin()){noPermission();return;}
  const family = FAMILIES.find(f => f.id === id);
  if(!family){alert('е®¶еәӯдёҚеӯҳең?);return;}
  if(FAMILIES.length <= 1){alert('иҮіе°‘дҝқз•ҷдёҖдёӘе®¶еә?);return;}
  // дёҚиғҪеҲ йҷӨиҮӘе·ұеҪ“еүҚжүҖеңЁзҡ„е®¶еәӯпјҲйҳІжӯўиҜҜеҲ еҜјиҮҙж— е®¶еҸҜеҪ’пјү
  if(id === currentFamilyId){alert('дёҚиғҪеҲ йҷӨеҪ“еүҚжүҖеңЁзҡ„е®¶еәӯпјҢиҜ·е…ҲеҲҮжҚўеҲ°е…¶д»–е®¶еәӯ');return;}
  if(!confirm(`зЎ®е®ҡеҲ йҷӨе®¶еәӯ"${family.name}"пјҹиҜҘе®¶еәӯдёӢжүҖжңүз”ЁжҲ·е’Ңж•°жҚ®е°Ҷиў«ж°ёд№…з§»йҷӨгҖӮ`)) return;
  const delName = family.name;
  
  // еҲ йҷӨе®¶еәӯдёӯзҡ„з”ЁжҲ·
  USERS = USERS.filter(u => u.familyId !== id);
  saveUsers();
  // еҲ йҷӨе®¶еәӯзӣёе…ізҡ„жүҖжңүж•°жҚ®пјҲжҲҗе‘ҳгҖҒиө„дә§гҖҒиҙҹеҖәгҖҒеҖәжқғгҖҒж”¶ж”Ҝпјү
  DB.members = DB.members.filter(m => m.familyId !== id);
  DB.assets = DB.assets.filter(a => a.familyId !== id);
  DB.debts = DB.debts.filter(d => d.familyId !== id);
  DB.receivables = DB.receivables.filter(r => r.familyId !== id);
  DB.income = DB.income.filter(i => i.familyId !== id);
  save();
  FAMILIES = FAMILIES.filter(f => f.id !== id);
  saveFamilies();
  addLog('еҲ йҷӨ','е®¶еәӯ',delName,`еҲ йҷӨе®¶еәӯ`);
  
  openFamilyList(); // еҲ·ж–°еҲ—иЎЁ
}

async function saveSelfPassword(){
  const newPass = document.getElementById('sp-new-pass').value;
  const confirmPass = document.getElementById('sp-confirm-pass').value;
  const errorEl = document.getElementById('sp-error');
  errorEl.textContent = '';
  if(!newPass){ errorEl.textContent = 'иҜ·иҫ“е…Ҙж–°еҜҶз Ғ'; return; }
  if(newPass.length < 4){ errorEl.textContent = 'еҜҶз ҒиҮіе°‘4дёӘеӯ—з¬?; return; }
  if(newPass !== confirmPass){ errorEl.textContent = 'дёӨж¬ЎеҜҶз ҒдёҚдёҖиҮ?; return; }
  try {
    await apiFetch('/users/me/password', {
      method: 'PUT',
      body: JSON.stringify({ newPassword: newPass })
    });
    const idx = USERS.findIndex(x => x.id === currentUser?.id);
    if(idx !== -1) USERS[idx].password = newPass;
    saveUsers();
    closeModal('self-pass');
    addLog('зј–иҫ‘','з”ЁжҲ·',currentUser?.displayName,'дҝ®ж”№дәҶиҮӘе·ұзҡ„зҷ»еҪ•еҜҶз Ғ');

  } catch(e) {
    errorEl.textContent = e.message || 'дҝ®ж”№еӨұиҙҘ';
  }
}

// еҚғеҲҶдҪҚж јејҸеҢ–пјҲиҫ“е…ҘжЎҶз”Ёпјү
function toLocalStr(v){
  const n=parseFloat(String(v).replace(/,/g,''));
  if(isNaN(n)||n===0)return '';
  return n.toLocaleString('zh-CN',{maximumFractionDigits:2});
}

}

// еҲ©жҒҜи®Ўз®—пјҲеҚ•еҲ©пјҢжҢүеӨ©и®Ўз®—пј?function calcAccruedInterest(r){
  if(!r.rate || r.rate === 0 || !r.loanDate) return 0;
  const principal = r.amount - r.returned; // жңӘиҝҳжң¬йҮ‘дҪңдёәи®ЎжҒҜеҹәзЎҖ
  if(principal <= 0) return 0;
  const loanDate = new Date(r.loanDate);
  const today = new Date();
  const days = Math.max(0, Math.floor((today - loanDate) / (1000 * 60 * 60 * 24)));
  return principal * (r.rate / 100) * (days / 365);
}

// и®Ўз®—жүҖжңүеә”ж”¶еҖәжқғзҡ„еә”и®ЎеҲ©жҒ?function calcTotalAccruedInterest(){
  return DB.receivables.reduce((s,r)=>{
    if(r.status === 'е·Іе…Ёйўқеӣһж”?) return s;
    return s + calcAccruedInterest(r);
  },0);
}

// и®Ўз®—еҚ•з¬”иҙҹеҖәзҡ„еә”д»ҳеҲ©жҒҜпјҲеҚ•еҲ©пјҢжҢүеӨ©пј?function calcDebtInterest(d){
  if(!d.rate || d.rate === 0 || !d.startDate) return 0;
  if(d.status === 'е·Із»“жё?) return 0;
  const principal = d.remain;
  if(principal <= 0) return 0;
  const startDate = new Date(d.startDate);
  const today = new Date();
  const days = Math.max(0, Math.floor((today - startDate) / (1000 * 60 * 60 * 24)));
  return principal * (d.rate / 100) * (days / 365);
}

// и®Ўз®—жүҖжңүиҙҹеҖәзҡ„еә”д»ҳеҲ©жҒҜ
function calcTotalDebtInterest(){
  return DB.debts.reduce((s,d)=>{
    if(d.status === 'е·Із»“жё?) return s;
    return s + calcDebtInterest(d);
  },0);
}

function getTotals(){
  const fd = getCurrentFamilyData();
  const totalAsset=fd.assets.reduce((s,a)=>s+a.val,0);
  const totalReceivable=fd.receivables.reduce((s,r)=>s+(r.amount-r.returned),0);
  const totalReceivableInterest=calcTotalAccruedInterest();
  const totalDebt=fd.debts.filter(d=>d.status!=='е·Із»“жё?).reduce((s,d)=>s+d.remain,0);
  const totalDebtInterest=calcTotalDebtInterest();
  const net=totalAsset+totalReceivable+totalReceivableInterest-totalDebt-totalDebtInterest;
  const nowIncome=fd.income.filter(i=>i.type==='ж”¶е…Ҙ'&&i.month==='2026-05').reduce((s,i)=>s+i.amount,0);
  const nowExpense=fd.income.filter(i=>i.type==='ж”ҜеҮә'&&i.month==='2026-05').reduce((s,i)=>s+i.amount,0);
  const monthlyDebt=fd.debts.filter(d=>d.status!=='е·Із»“жё?).reduce((s,d)=>s+d.monthly,0);
  return{totalAsset,totalReceivable,totalReceivableInterest,totalDebt,totalDebtInterest,net,nowIncome,nowExpense,monthlyDebt};
}

function saveReceivable(){
  const borrower=document.getElementById('r-borrower').value.trim();
  if(!borrower){alert('иҜ·еЎ«еҶҷеҖҹж¬ҫдәәе§“еҗ?);return;}
  const amount=parseNum(document.getElementById('r-amount').value)||0;
  if(amount<=0){alert('еҖҹж¬ҫйҮ‘йўқйңҖеӨ§дәҺ0');return;}
  const item={
    id:editingId||Date.now(),
    borrower,
    amount,
    returned:parseNum(document.getElementById('r-returned').value)||0,
    rate:parseFloat(document.getElementById('r-rate').value)||0,
    loanDate:document.getElementById('r-loanDate').value,
    dueDate:document.getElementById('r-dueDate').value,
    status:document.getElementById('r-status').value,
    note:document.getElementById('r-note').value,
    familyId: currentFamilyId
  };
  if(editingId){
    const idx=DB.receivables.findIndex(r=>r.id===editingId);
    DB.receivables[idx]={...DB.receivables[idx],...item};
    addLog('зј–иҫ‘','еҖәжқғ',borrower,`жӣҙж–°еҖәжқғи®°еҪ•пјҢеҖҹж¬ҫ ВҘ${fmtNum(amount)}`);
  }else{
    DB.receivables.push(item);
    addLog('ж–°еўһ','еҖәжқғ',borrower,`ж·»еҠ еҖәжқғи®°еҪ•пјҢеҖҹж¬ҫ ВҘ${fmtNum(amount)}`);
  }
  save();closeModal('receivable');renderReceivables();
}

function editReceivable(id){
  editingId=id;
  const r=DB.receivables.find(x=>x.id===id);
  document.getElementById('receivable-modal-title').textContent='зј–иҫ‘еҖәжқғи®°еҪ•';
  document.getElementById('r-borrower').value=r.borrower;
  document.getElementById('r-amount').value=r.amount?toLocalStr(r.amount):'';
  document.getElementById('r-returned').value=r.returned?toLocalStr(r.returned):'';
  document.getElementById('r-rate').value=r.rate||'';
  document.getElementById('r-loanDate').value=r.loanDate||'';
  document.getElementById('r-dueDate').value=r.dueDate||'';
  document.getElementById('r-status').value=r.status;

}

function delReceivable(id){
  if(!confirm('зЎ®е®ҡеҲ йҷӨиҜҘеҖәжқғи®°еҪ•пј?))return;
  const r = DB.receivables.find(x=>x.id===id);
  const name = r ? r.borrower : 'жңӘзҹҘ';
  DB.receivables=DB.receivables.filter(r=>r.id!==id);
  addLog('еҲ йҷӨ','еҖәжқғ',name,`еҲ йҷӨеҖәжқғи®°еҪ•`);
  save();renderReceivables();
}

  const totalDebtWithInterest = totalDebt + totalDebtInterest;
  const wealthBase=totalAsset+totalReceivableWithInterest;
  const debtRatio=wealthBase>0?totalDebtWithInterest/wealthBase:0;
  const dti=nowIncome>0?monthlyDebt/nowIncome:0;
  const savings=nowIncome>0?(nowIncome-nowExpense)/nowIncome:0;

  if(savings<0.2)advices.push({icon:'\ud83d\udcb0',title:'еӮЁи“„зҺҮжңүжҸҗеҚҮз©әй—ҙ',text:`зӣ®еүҚжңҲеӮЁи“„зҺҮ${(savings*100).toFixed(1)}%пјҢе»әи®®жҺ§еҲ¶еЁұд№җж¶Ҳиҙ№пјҢжҜҸжңҲзӣ®ж ҮеӮЁи“„${fmt(Math.round(nowIncome*0.2))}гҖӮ`});

function saveAsset(){
  const name=document.getElementById('a-name').value.trim();
  if(!name){alert('иҜ·еЎ«еҶҷиө„дә§еҗҚз§?);return;}
  const item={
    id:editingId||Date.now(),
    name,
    cat:document.getElementById('a-cat').value,
    val:parseNum(document.getElementById('a-val').value)||0,
    cost:parseNum(document.getElementById('a-cost').value)||0,
    date:document.getElementById('a-date').value,
    note:document.getElementById('a-note').value,
    familyId: currentFamilyId
  };
  if(editingId){
    const idx=DB.assets.findIndex(a=>a.id===editingId);
    DB.assets[idx]={...DB.assets[idx],...item};
    addLog('зј–иҫ‘','иө„дә§',item.name,`жӣҙж–°иө„дә§пј?{item.cat}пјҢд»·еҖ?ВҘ${fmtNum(item.val)}`);
  }else{
    DB.assets.push(item);
    addLog('ж–°еўһ','иө„дә§',item.name,`ж·»еҠ иө„дә§пј?{item.cat}пјҢд»·еҖ?ВҘ${fmtNum(item.val)}`);
