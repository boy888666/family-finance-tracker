<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭资产负债管理系统（纯前端版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;background:#f5f6fa;color:#2c2c2a;line-height:1.6}
  .topbar{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
  .logo{font-size:16px;font-weight:500;color:#2c2c2a}
  .logo span{color:#185fa5}
  .nav{display:flex;gap:4px}
  .nav-btn{padding:6px 16px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:13px;color:#5f5e5a;transition:all .15s}
  .nav-btn:hover{background:#f1efe8;color:#2c2c2a}
  .nav-btn.active{background:#e6f1fb;color:#185fa5;font-weight:500}
  .page{display:none;padding:24px;max-width:1200px;margin:0 auto}
  .page.active{display:block}
  .section-title{font-size:15px;font-weight:500;color:#2c2c2a;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .section-title::before{content:'';width:3px;height:16px;background:#185fa5;border-radius:2px;display:inline-block}
  .card{background:#fff;border-radius:12px;border:0.5px solid #e8e8e8;padding:20px;margin-bottom:20px}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
  .metric{background:#f5f6fa;border-radius:8px;padding:16px;text-align:center}
  .metric-label{font-size:12px;color:#888780;margin-bottom:6px}
  .metric-value{font-size:22px;font-weight:500}
  .metric-value.up{color:#a32d2d}
  .metric-value.down{color:#3b6d11}
  .metric-value.blue{color:#185fa5}
  .metric-value.warn{color:#854f0b}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#f5f6fa;padding:10px 12px;text-align:left;font-weight:500;color:#5f5e5a;border-bottom:1px solid #e8e8e8;white-space:nowrap}
  td{padding:10px 12px;border-bottom:0.5px solid #f1efe8;color:#2c2c2a}
  tr:hover td{background:#fafaf8}
  tr:last-child td{border-bottom:none}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
  .tag-asset{background:#e6f1fb;color:#185fa5}
  .tag-debt{background:#fcebeb;color:#a32d2d}
  .tag-income{background:#eaf3de;color:#3b6d11}
  .tag-expense{background:#faeda;color:#854f0b}
  .btn{padding:8px 16px;border-radius:6px;border:0.5px solid #c0d4e8;background:#fff;color:#185fa5;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s}
  .btn:hover{background:#e6f1fb}
  .btn-primary{background:#185fa5;color:#fff;border-color:#185fa5}
  .btn-primary:hover{background:#0c447c}
  .btn-danger{color:#a32d2d;border-color:#f7c1c1}
  .btn-danger:hover{background:#fcebeb}
  .btn-sm{padding:4px 10px;font-size:12px}
  .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:12px}
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-group label{font-size:12px;color:#5f5e5a;font-weight:500}
  input,select,textarea{padding:8px 10px;border:0.5px solid #d3d1c7;border-radius:6px;font-size:13px;font-family:inherit;color:#2c2c2a;background:#fff;width:100%}
  input:focus,select:focus{outline:none;border-color:#185fa5}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:560px;max-height:90vh;overflow-y:auto}
  .modal-title{font-size:15px;font-weight:500;margin-bottom:20px}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:16px;border-top:0.5px solid #e8e8e8}
  .chart-wrap{position:relative;width:100%;height:280px}
  .progress-bar{height:8px;background:#f1efe8;border-radius:4px;overflow:hidden;margin-top:6px}
  .progress-fill{height:100%;border-radius:4px;transition:width .5s}
  .summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #f1efe8}
  .summary-row:last-child{border-bottom:none}
  .badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:500}
  .net-positive{color:#a32d2d}
  .net-negative{color:#3b6d11}
  .tabs{display:flex;gap:2px;background:#f5f6fa;border-radius:8px;padding:3px;margin-bottom:16px;width:fit-content}
  .tab{padding:5px 16px;border-radius:6px;border:none;background:transparent;font-size:13px;cursor:pointer;color:#5f5e5a;transition:all .15s}
  .tab.active{background:#fff;color:#2c2c2a;font-weight:500;box-shadow:0 0 0 0.5px #e8e8e8}
  .ratio-bar{display:flex;height:32px;border-radius:6px;overflow:hidden;margin-bottom:8px}
  .ratio-fill{display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:500;transition:width .5s}
  .empty-tip{text-align:center;padding:32px;color:#888780;font-size:13px}
  .tag-lend{background:#fbeaf0;color:#d4537e}
  @media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}.nav-btn span{display:none}}
  .num-input{text-align:right;font-variant-numeric:tabular-nums}
  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
  .status-normal{background:#3b6d11}
  .status-overdue{background:#a32d2d}
  .status-returned{background:#888780}
  /* 登录页面 */
  .login-overlay{display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#185fa5 0%,#0c447c 100%);z-index:1000;align-items:center;justify-content:center}
  .login-box{background:#fff;border-radius:16px;padding:40px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-title{font-size:22px;font-weight:600;text-align:center;margin-bottom:8px;color:#2c2c2a}
  .login-subtitle{font-size:13px;color:#888780;text-align:center;margin-bottom:28px}
  .login-logo{font-size:36px;text-align:center;margin-bottom:20px}
  .login-error{background:#fcebeb;color:#a32d2d;padding:10px;border-radius:6px;margin-bottom:16px;font-size:13px;display:none}
  .login-footer{text-align:center;margin-top:20px;font-size:12px;color:#888780}
  .user-info{display:flex;align-items:center;gap:8px}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:#185fa5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500}
  .user-name{font-size:13px;color:#2c2c2a;font-weight:500}
  .user-role{font-size:11px;color:#888780}
  .hidden{display:none!important}
</style>
</head>
<body>

<!-- 登录页面 -->
<div class="login-overlay" id="loginPage">
  <div class="login-box">
    <div class="login-logo">🏠</div>
    <div class="login-title">家庭财务管家</div>
    <div class="login-subtitle">请登录以继续</div>
    <div class="login-error" id="loginError"></div>
    <div class="form-group" style="margin-bottom:12px">
      <label>用户名</label>
      <input type="text" id="loginUsername" placeholder="请输入用户名" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="btn btn-primary" style="width:100%;padding:10px;font-size:14px" onclick="doLogin()">登录</button>
    <div class="login-footer">
      💡 首次使用请先点击上方「初始化数据库」<br>
      默认账号：admin / admin123
    </div>
  </div>
</div>

<script>
// ========== 默认数据定义 ==========
const DEFAULT_DATA = {
  members: [
    {id:1,name:'户主',role:'户主',relation:'本人',birth:1980,jobStatus:'在职',income:0,note:''},
  ],
  assets: [],
  receivables: [],
  debts: [],
  income: [],
  logs: []
};

const DEFAULT_FAMILIES = [
  {id: 'fam_1', name: '默认家庭', code: 'default', note: '系统默认家庭', createTime: new Date().toISOString()}
];

const DEFAULT_USERS = [
  {id: 1, username: 'admin', password: 'admin123', displayName: '管理员', role: 'admin', familyId: 'fam_1', memberId: null, createTime: new Date().toISOString()}
];

// ========== 全局数据对象 ==========
let DB = JSON.parse(JSON.stringify(DEFAULT_DATA));
let FAMILIES = [];
let USERS = [];
let currentUser = null;
let currentFamilyId = null;
let apiToken = null;

// ========== localStorage操作函数 ==========
function initLocalStorage() {
  // 初始化数据库
  if (!localStorage.getItem('family_finance_v6')) {
    localStorage.setItem('family_finance_v6', JSON.stringify(DEFAULT_DATA));
  }
  
  if (!localStorage.getItem('family_finance_families')) {
    localStorage.setItem('family_finance_families', JSON.stringify(DEFAULT_FAMILIES));
  }
  
  if (!localStorage.getItem('family_finance_users')) {
    localStorage.setItem('family_finance_users', JSON.stringify(DEFAULT_USERS));
  }
  
  // 加载数据
  DB = JSON.parse(localStorage.getItem('family_finance_v6') || 'null') || JSON.parse(JSON.stringify(DEFAULT_DATA));
  FAMILIES = JSON.parse(localStorage.getItem('family_finance_families') || '[]');
  USERS = JSON.parse(localStorage.getItem('family_finance_users') || '[]');
  
  // 加载日志
  DB.logs = JSON.parse(localStorage.getItem('family_finance_logs') || '[]');
}

function saveDB() {
  localStorage.setItem('family_finance_v6', JSON.stringify(DB));
}

function saveFamilies() {
  localStorage.setItem('family_finance_families', JSON.stringify(FAMILIES));
}

function saveUsers() {
  localStorage.setItem('family_finance_users', JSON.stringify(USERS));
}

function saveLogs() {
  localStorage.setItem('family_finance_logs', JSON.stringify(DB.logs));
}

// ========== 模拟API函数 ==========
async function apiFetch(path, options = {}) {
  // 模拟网络延迟
  await new Promise(resolve => setTimeout(resolve, 100));
  
  try {
    // 登录
    if (path === '/api/login' && options.method === 'POST') {
      const body = JSON.parse(options.body);
      const user = USERS.find(u => u.username === body.username && u.password === body.password);
      if (user) {
        return { token: 'local_token_' + Date.now(), user: user };
      } else {
        throw new Error('用户名或密码错误');
      }
    }
    
    // 获取家庭列表
    if (path === '/api/families' && (!options.method || options.method === 'GET')) {
      return { families: FAMILIES };
    }
    
    // 获取用户列表
    if (path.startsWith('/api/users')) {
      return USERS.filter(u => u.familyId === currentFamilyId);
    }
    
    // 获取数据
    if (path.match(/\/api\/data\/.*/)) {
      return {
        data: {
          members: DB.members,
          assets: DB.assets,
          debts: DB.debts,
          receivables: DB.receivables,
          income: DB.income
        }
      };
    }
    
    // 同步数据
    if (path.match(/\/api\/data\/.*\/sync/) && options.method === 'POST') {
      const body = JSON.parse(options.body);
      if (body.type === 'log') {
        DB.logs.unshift(body.data);
        if (DB.logs.length > 500) DB.logs = DB.logs.slice(0, 500);
        saveLogs();
      }
      return { success: true };
    }
    
    // 初始化数据库
    if (path === '/.netlify/functions/init' && options.method === 'POST') {
      localStorage.setItem('family_finance_v6', JSON.stringify(DEFAULT_DATA));
      localStorage.setItem('family_finance_families', JSON.stringify(DEFAULT_FAMILIES));
      localStorage.setItem('family_finance_users', JSON.stringify(DEFAULT_USERS));
      initLocalStorage();
      return { message: '数据库初始化成功！' };
    }
    
    throw new Error('API路径未实现: ' + path);
  } catch (e) {
    throw e;
  }
}

// ========== 认证函数 ==========
function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  
  if (!username || !password) {
    showLoginError('请输入用户名和密码');
    return;
  }
  
  try {
    const res = await apiFetch('/api/login', {
      method: 'POST',
      body: JSON.stringify({ username, password })
    });
    
    apiToken = res.token;
    currentUser = res.user;
    currentFamilyId = currentUser.familyId;
    
    // 保存到sessionStorage
    sessionStorage.setItem('ff_token', apiToken);
    sessionStorage.setItem('ff_user', JSON.stringify(currentUser));
    sessionStorage.setItem('ff_familyId', currentFamilyId);
    
    showMainApp();
  } catch (e) {
    showLoginError(e.message);
  }
}

async function checkAuth() {
  const token = sessionStorage.getItem('ff_token');
  const savedUser = sessionStorage.getItem('ff_user');
  
  if (token && savedUser) {
    try {
      apiToken = token;
      currentUser = JSON.parse(savedUser);
      currentFamilyId = sessionStorage.getItem('ff_familyId') || currentUser.familyId;
      
      // 从localStorage加载数据
      initLocalStorage();
      
      showMainApp();
      return true;
    } catch (e) {
      apiToken = null;
      currentUser = null;
    }
  }
  return false;
}

function doLogout() {
  apiToken = null;
  currentUser = null;
  currentFamilyId = null;
  sessionStorage.removeItem('ff_token');
  sessionStorage.removeItem('ff_user');
  sessionStorage.removeItem('ff_familyId');
  document.getElementById('loginPage').style.display = 'flex';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('userInfo').style.display = 'none';
}

// ========== 初始化数据库 ==========
async function initDatabase() {
  const btn = document.getElementById('initDbBtn');
  const status = document.getElementById('initDbStatus');
  
  btn.disabled = true;
  btn.textContent = '初始化中...';
  status.style.display = 'none';
  
  try {
    const res = await apiFetch('/.netlify/functions/init', { method: 'POST' });
    status.style.color = '#3b6d11';
    status.textContent = '✅ ' + res.message;
    status.style.display = 'block';
  } catch(e) {
    status.style.color = '#a32d2d';
    status.textContent = '❌ ' + e.message;
    status.style.display = 'block';
  }
  
  btn.disabled = false;
  btn.textContent = '⚙️ 初始化数据库（首次部署点击）';
}

// ========== 主应用显示 ==========
function showMainApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('userInfo').style.display = 'flex';
  document.getElementById('userName').textContent = currentUser.displayName;
  document.getElementById('userRole').textContent = currentUser.role === 'admin' ? '管理员' : '成员';
  document.getElementById('userAvatar').textContent = currentUser.displayName.charAt(0);
  
  showPage('overview');
}

function showPage(pageName) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageName).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ========== 数据操作函数 ==========
function addLog(action, module, target, detail) {
  if (!currentUser) return;
  const entry = {
    id: 'log_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    time: new Date().toISOString(),
    userId: currentUser.id,
    username: currentUser.displayName,
    familyId: currentFamilyId,
    familyName: FAMILIES.find(f => f.id === currentFamilyId)?.name || '默认家庭',
    action,
    module,
    target,
    detail
  };
  
  DB.logs.unshift(entry);
  if (DB.logs.length > 500) DB.logs = DB.logs.slice(0, 500);
  saveLogs();
}

// ========== 导入/导出功能 ==========
function exportData() {
  const data = {
    version: '1.0',
    exportTime: new Date().toISOString(),
    db: DB,
    families: FAMILIES,
    users: USERS
  };
  
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '家庭财务数据_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  
  alert('✅ 数据导出成功！');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(event) {
      try {
        const data = JSON.parse(event.target.result);
        if (confirm('导入将覆盖当前数据，是否继续？')) {
          DB = data.db || JSON.parse(JSON.stringify(DEFAULT_DATA));
          FAMILIES = data.families || DEFAULT_FAMILIES;
          USERS = data.users || DEFAULT_USERS;
          
          saveDB();
          saveFamilies();
          saveUsers();
          
          alert('✅ 数据导入成功！页面将刷新。');
          location.reload();
        }
      } catch (e) {
        alert('❌ 文件格式错误：' + e.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ========== 页面加载时检查认证 ==========
window.onload = function() {
  checkAuth();
};

// ========== 以下是原有的UI渲染函数（简化版）==========

// 渲染总览页面
function renderOverview() {
  const fd = getCurrentFamilyData();
  const netWorth = fd.assets.reduce((s, a) => s + a.val, 0) - fd.debts.reduce((s, d) => s + d.remain, 0);
  
  document.getElementById('overview-metrics').innerHTML = `
    <div class="metric">
      <div class="metric-label">总资产</div>
      <div class="metric-value up">¥${(fd.assets.reduce((s, a) => s + a.val, 0)).toLocaleString()}</div>
    </div>
    <div class="metric">
      <div class="metric-label">总负债</div>
      <div class="metric-value down">¥${(fd.debts.reduce((s, d) => s + d.remain, 0)).toLocaleString()}</div>
    </div>
    <div class="metric">
      <div class="metric-label">净资产</div>
      <div class="metric-value ${netWorth >= 0 ? 'up' : 'down'}">¥${netWorth.toLocaleString()}</div>
    </div>
    <div class="metric">
      <div class="metric-label">成员数</div>
      <div class="metric-value blue">${fd.members.length}人</div>
    </div>
  `;
}

function getCurrentFamilyData() {
  return {
    familyId: currentFamilyId,
    members: DB.members,
    assets: DB.assets,
    debts: DB.debts,
    receivables: DB.receivables,
    income: DB.income
  };
}

// 占位函数 - 实际使用时可以完善
function filterAssets(cat) { console.log('Filter assets by:', cat); }
function filterDebts(cat) { console.log('Filter debts by:', cat); }
function openModal(type) { console.log('Open modal:', type); }
function closeModal(type) { console.log('Close modal:', type); }
function renderLogs() { console.log('Render logs'); }
function openLogs() { console.log('Open logs'); }

</script>

<!-- 初始化数据库按钮（固定在顶部） -->
<div style="position:fixed;top:10px;right:10px;z-index:9999;display:flex;gap:8px">
  <button class="btn btn-sm" onclick="initDatabase()" id="initDbBtn" style="color:#888;background:#fff;border-color:#e0e0e0;font-size:11px">⚙️ 初始化数据库</button>
  <button class="btn btn-sm" onclick="exportData()" style="color:#185fa5;background:#fff;border-color:#185fa5;font-size:11px">📤 导出数据</button>
  <button class="btn btn-sm" onclick="importData()" style="color:#3b6d11;background:#fff;border-color:#3b6d11;font-size:11px">📥 导入数据</button>
  <div id="initDbStatus" style="display:none;font-size:11px;padding:4px 8px;border-radius:4px"></div>
</div>

<!-- 顶部导航栏 -->
<div class="topbar">
  <div class="logo">🏠 家庭<span>财务</span>管家 <span style="font-size:11px;color:#888;font-weight:normal">（纯前端版）</span></div>
  <div class="nav" id="mainNav">
    <button class="nav-btn active" onclick="showPage('overview')">总览</button>
    <button class="nav-btn" onclick="showPage('assets')">资产</button>
    <button class="nav-btn" onclick="showPage('debts')">负债</button>
    <button class="nav-btn" onclick="showPage('income')">收支</button>
    <button class="nav-btn" onclick="showPage('analysis')">分析</button>
  </div>
  <div class="user-info" id="userInfo" style="display:none">
    <div class="user-avatar" id="userAvatar">U</div>
    <div>
      <div class="user-name" id="userName">用户名</div>
      <div class="user-role" id="userRole">成员</div>
    </div>
    <button class="btn btn-sm" onclick="doLogout()" style="margin-left:8px">退出</button>
  </div>
</div>

<!-- 总览页 -->
<div id="page-overview" class="page active">
  <div class="metrics" id="overview-metrics"></div>
